version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FiscalMind — Docker Compose (Development)
#
# Services:
#   postgres  — Primary database
#   redis     — Cache, session store, Celery broker
#   qdrant    — Vector database for RAG
#   backend   — FastAPI application
#   worker    — Celery background task worker
#
# Start: docker-compose up --build
# Stop:  docker-compose down
# Reset: docker-compose down -v  (removes all data volumes)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  fiscalmind_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fiscalmind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fiscalmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fiscalmind_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fiscalmind_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fiscalmind_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fiscalmind} -d ${POSTGRES_DB:-fiscalmind_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fiscalmind_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fiscalmind_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector Database) ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: fiscalmind_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    networks:
      - fiscalmind_net
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiscalmind_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override host names to use Docker network service names
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fiscalmind}:${POSTGRES_PASSWORD:-fiscalmind_secret}@postgres:5432/${POSTGRES_DB:-fiscalmind_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - uploads_data:/app/uploads
      # Hot-reload in development: mount source code
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - fiscalmind_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  # Handles background tasks: OCR, parsing, embedding, etc.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiscalmind_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fiscalmind}:${POSTGRES_PASSWORD:-fiscalmind_secret}@postgres:5432/${POSTGRES_DB:-fiscalmind_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - uploads_data:/app/uploads
      - ./backend:/app
    networks:
      - fiscalmind_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  # ── PaddleOCR Serving Service ───────────────────────────────────────────────
  ocr-service:
    build:
      context: ./ocr_service
      dockerfile: Dockerfile
    container_name: fiscalmind_ocr
    restart: unless-stopped
    ports:
      - "8002:8002"
    networks:
      - fiscalmind_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

